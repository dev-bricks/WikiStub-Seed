name: WikiStub-Seed smoke tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python sources
        run: |
          python -m py_compile \
            check_duplicates.py \
            manage_translations.py \
            md_to_json.py \
            wikistub_seed_cli.py \
            wikistub_seed_pipeline.py \
            pipeline.py \
            translate.py \
            translator.py

      - name: Check CLI and data pipeline
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python wikistub_seed_cli.py --help
          python wikistub_seed_cli.py stats
          python wikistub_seed_cli.py check
          python wikistub_seed_pipeline.py validate
