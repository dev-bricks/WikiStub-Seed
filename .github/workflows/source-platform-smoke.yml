name: WikiStub-Seed source-platform smoke

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-platform-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile source smoke and entry points
        run: |
          python -m py_compile \
            check_duplicates.py \
            language_model.py \
            wikistub_seed_cli.py \
            wikistub_seed_pipeline.py \
            tests/source_platform_smoke.py

      - name: Run macOS/Linux source smoke
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python tests/source_platform_smoke.py
