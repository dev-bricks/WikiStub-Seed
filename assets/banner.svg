<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="100%">
  <defs>
    <!-- Deep tech background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16" />
      <stop offset="50%" stop-color="#111125" />
      <stop offset="100%" stop-color="#181830" />
    </linearGradient>

    <!-- Main Indigo-to-Cyan gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Amber-to-Orange gradient for seed highlights -->
    <linearGradient id="seedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Violet/Pink gradient for secondary highlights -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Glowing filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#ffffff" opacity="0.08" />
    </pattern>

    <style>
      .title-text {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 58px;
        fill: #ffffff;
        letter-spacing: -1.5px;
      }
      .tagline-text {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 500;
        font-size: 16.5px;
        fill: #94a3b8;
        letter-spacing: 0.5px;
      }
      .page-card {
        fill: #16162a;
        fill-opacity: 0.7;
        stroke: #334155;
        stroke-width: 1.5;
      }
      .page-card-top {
        fill: #1a1a35;
        fill-opacity: 0.85;
        stroke: #475569;
        stroke-width: 1.5;
      }
      .stub-line {
        fill: #334155;
      }
      .stub-accent {
        fill: url(#primaryGrad);
      }
      .node-dot {
        fill: #06b6d4;
        filter: drop-shadow(0 0 4px #06b6d4);
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bgGrad)" />

  <!-- Background Glows -->
  <circle cx="150" cy="100" r="180" fill="#4f46e5" opacity="0.12" filter="url(#softGlow)" />
  <circle cx="1050" cy="80" r="150" fill="#06b6d4" opacity="0.15" filter="url(#softGlow)" />
  <circle cx="600" cy="180" r="120" fill="#8b5cf6" opacity="0.06" filter="url(#softGlow)" />

  <!-- Grid overlay -->
  <rect width="1200" height="200" fill="url(#grid)" />

  <!-- Subtle connecting lines in background (network grid) -->
  <path d="M 850,50 L 930,90 L 900,160 M 930,90 L 1020,60 L 1090,110 M 1020,60 L 1000,10 M 1090,110 L 1150,80" 
        stroke="#334155" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4 4" />

  <!-- Glowing network nodes -->
  <circle cx="850" cy="50" r="3" class="node-dot" opacity="0.3" />
  <circle cx="930" cy="90" r="4" class="node-dot" opacity="0.5" />
  <circle cx="900" cy="160" r="3" class="node-dot" opacity="0.3" />
  <circle cx="1020" cy="60" r="4" class="node-dot" opacity="0.6" />
  <circle cx="1090" cy="110" r="5" fill="url(#pinkGrad)" />
  <circle cx="1000" cy="10" r="3" class="node-dot" opacity="0.2" />
  <circle cx="1150" cy="80" r="4" class="node-dot" opacity="0.4" />

  <!-- Left boundary accent strip -->
  <rect x="0" y="0" width="6" height="200" fill="url(#primaryGrad)" />
  <rect x="6" y="40" width="2" height="120" fill="url(#pinkGrad)" opacity="0.4" />

  <!-- Knowledge Blocks / Wiki Stack Graphic -->
  <g id="wiki-stack" transform="translate(40, 0)">
    <!-- Page 1 (Bottom Left) -->
    <rect x="840" y="75" width="120" height="85" rx="8" class="page-card" transform="rotate(-12 900 117)" />
    
    <!-- Page 2 (Middle Right) -->
    <rect x="910" y="65" width="120" height="85" rx="8" class="page-card" transform="rotate(8 970 107)" />
    <!-- Content Mockup in Page 2 -->
    <g transform="rotate(8 970 107)">
      <rect x="925" y="80" width="40" height="6" rx="2" class="stub-line" opacity="0.6" />
      <rect x="925" y="95" width="90" height="4" rx="1.5" class="stub-line" opacity="0.4" />
      <rect x="925" y="105" width="70" height="4" rx="1.5" class="stub-line" opacity="0.4" />
    </g>

    <!-- Page 3 (Top / Focus Page) -->
    <rect x="870" y="45" width="130" height="95" rx="8" class="page-card-top" transform="rotate(-3 935 92)" />
    <!-- Content Mockup in Top Page -->
    <g transform="rotate(-3 935 92)">
      <!-- Page Title -->
      <rect x="885" y="60" width="55" height="8" rx="2.5" fill="url(#primaryGrad)" />
      <circle cx="985" cy="64" r="5" fill="#10b981" /> <!-- Green "ready" status badge -->
      
      <!-- Horizontal lines representing wiki text sections -->
      <rect x="885" y="78" width="100" height="4" rx="1.5" class="stub-line" />
      <rect x="885" y="88" width="90" height="4" rx="1.5" class="stub-line" />
      <rect x="885" y="98" width="95" height="4" rx="1.5" class="stub-line" />
      <rect x="885" y="108" width="60" height="4" rx="1.5" class="stub-line" />

      <!-- Inner accent block suggesting seed growth -->
      <rect x="885" y="120" width="30" height="10" rx="3" fill="url(#pinkGrad)" opacity="0.8" />
      <rect x="920" y="120" width="45" height="10" rx="3" fill="#1e1b4b" stroke="#4338ca" stroke-width="1" />
    </g>

    <!-- Floating "Seeds" (Deploying Knowledge Blocks) -->
    <!-- Seed 1: Indigo square rising up -->
    <rect x="840" y="25" width="14" height="14" rx="3" fill="url(#primaryGrad)" transform="rotate(15 847 32)" filter="drop-shadow(0 2px 8px rgba(99, 102, 241, 0.6))" />
    <path d="M 885,55 C 870,45 855,40 847,32" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="2 2" fill="none" opacity="0.6" />

    <!-- Seed 2: Gold square floating to the right -->
    <rect x="1020" y="125" width="16" height="16" rx="4" fill="url(#seedGrad)" transform="rotate(-20 1028 133)" filter="drop-shadow(0 2px 10px rgba(245, 158, 11, 0.5))" />
    <path d="M 1000,105 C 1010,115 1015,120 1028,133" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="2 2" fill="none" opacity="0.6" />

    <!-- Seed 3: Pink/Violet tiny square at top right -->
    <rect x="1035" y="35" width="10" height="10" rx="2" fill="url(#pinkGrad)" transform="rotate(45 1040 40)" filter="drop-shadow(0 2px 6px rgba(236, 72, 153, 0.5))" />
    <path d="M 975,50 C 1000,40 1020,40 1040,40" stroke="#ec4899" stroke-width="1.2" stroke-dasharray="2 2" fill="none" opacity="0.5" />
  </g>

  <!-- Title & Tagline -->
  <g transform="translate(100, 95)">
    <!-- Main Title "WikiStub-Seed" -->
    <text class="title-text" x="0" y="0">WikiStub<tspan fill="url(#primaryGrad)">-Seed</tspan></text>
    
    <!-- Tagline -->
    <text class="tagline-text" x="0" y="34">Multilingual knowledge-stub seed · deployable wiki module</text>
  </g>
</svg>
