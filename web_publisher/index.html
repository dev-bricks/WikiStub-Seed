<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-title" content="WikiStub-Seed">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>WikiStub-Seed — Wissenschaftliches Lexikon</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/Icon-192.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1a73e8;
      --bg: #f8f9fa;
      --panel: #ffffff;
      --border: #dadce0;
      --text: #202124;
      --muted: #5f6368;
      --tag-bg: #e8f0fe;
      --tag-fg: #1a73e8;
      --sidebar-w: 220px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      padding-top: env(safe-area-inset-top, 0px);
      padding-right: env(safe-area-inset-right, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
    #search {
      padding: 6px 12px;
      border-radius: 20px;
      border: none;
      font-size: 14px;
      width: 200px;
      outline: none;
      min-height: 44px;
    }
    #lang-toggle {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 13px;
      min-height: 44px;
      min-width: 44px;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    nav {
      width: var(--sidebar-w);
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
    }
    #cat-tree { list-style: none; padding: 8px 0; }
    #cat-tree li {
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      border-left: 3px solid transparent;
    }
    #cat-tree li:hover { background: #f1f3f4; }
    #cat-tree li.active { border-left-color: var(--accent); background: #e8f0fe; color: var(--accent); font-weight: 600; }
    #cat-tree .sub-list { list-style: none; display: none; }
    #cat-tree .cat-item:hover .sub-list,
    #cat-tree .cat-item.active .sub-list { display: block; }
    #cat-tree .sub-list li { padding: 5px 14px 5px 24px; font-size: 12px; color: var(--muted); }
    #cat-tree .sub-list li:hover { color: var(--accent); }

    /* ── Stub list ── */
    #stub-panel {
      width: 240px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      background: var(--bg);
    }
    #stub-list { list-style: none; }
    #stub-list li {
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    #stub-list li:hover { background: #f1f3f4; }
    #stub-list li.active { background: #e8f0fe; color: var(--accent); font-weight: 600; }
    #stub-list .empty { color: var(--muted); font-style: italic; }

    /* ── Detail ── */
    #detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    #detail h2 { font-size: 1.4rem; margin-bottom: 4px; }
    #detail .breadcrumb { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
    #detail h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 16px 0 6px; }
    #detail p { line-height: 1.6; }
    #detail .tags { margin-top: 16px; }
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-fg);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      margin: 2px 3px 2px 0;
    }
    #loading { padding: 24px; color: var(--muted); }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      nav { display: none; }
      #stub-panel { width: 140px; }
      #search { width: 130px; }
    }
    @media (max-width: 420px) {
      .layout { display: block; overflow-y: auto; }
      #stub-panel {
        display: block;
        width: 100%;
        max-height: 38vh;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      #detail-panel { overflow: visible; padding: 18px; }
      #search { min-width: 0; width: min(52vw, 220px); }
    }
  </style>
</head>
<body>
  <header>
    <h1>WikiStub-Seed</h1>
    <input id="search" type="search" placeholder="Suche…" autocomplete="off">
    <button id="lang-toggle">EN</button>
  </header>
  <div class="layout">
    <nav><ul id="cat-tree"></ul></nav>
    <div id="stub-panel"><ul id="stub-list"></ul></div>
    <main id="detail-panel">
      <p id="loading">Lade Daten…</p>
      <div id="detail"></div>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
